<!-- login.html -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mithaas — Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --brand: #FF6B35;
            --brand-dark: #e55a25;
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --card2: #222;
            --border: #2e2e2e;
            --text: #f0f0f0;
            --muted: #888;
            --red: #ef4444;
            --yellow: #f59e0b;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(255, 107, 53, 0.07) 0%, transparent 60%);
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        /* LICENSE ALERT */
        .license-alert {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.35);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: var(--yellow);
            margin-bottom: 16px;
            display: none;
            text-align: center;
            line-height: 1.5;
        }

        /* LOGO */
        .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 62px;
            height: 62px;
            background: linear-gradient(135deg, var(--brand), #ff9a5c);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 10px;
            box-shadow: 0 8px 32px rgba(255, 107, 53, 0.25);
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 800;
        }

        .logo h1 span {
            color: var(--brand);
        }

        .logo p {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
        }

        /* TABS */
        .tab-switcher {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            background: var(--card2);
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px;
            text-align: center;
            border-radius: 9px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            transition: all .2s;
        }

        .tab-btn.active {
            background: var(--brand);
            color: #fff;
        }

        /* CARD */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        /* FORM */
        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        input,
        select {
            width: 100%;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 14px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
        }

        input:focus,
        select:focus {
            border-color: var(--brand);
        }

        select option {
            background: var(--card2);
        }

        /* PIN PAD */
        .pin-display {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin: 16px 0 20px;
        }

        .pin-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--border);
            transition: all .2s;
        }

        .pin-dot.filled {
            background: var(--brand);
            transform: scale(1.2);
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .num-btn {
            padding: 16px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: all .15s;
            user-select: none;
        }

        .num-btn:hover {
            border-color: var(--brand);
            color: var(--brand);
        }

        .num-btn:active {
            transform: scale(0.93);
            background: var(--brand);
            color: #fff;
            border-color: var(--brand);
        }

        .num-btn.del {
            font-size: 14px;
            color: var(--muted);
        }

        .num-btn.del:hover {
            color: var(--red);
            border-color: var(--red);
        }

        /* BTN */
        .btn {
            width: 100%;
            padding: 13px;
            background: var(--brand);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            margin-top: 6px;
        }

        .btn:hover {
            background: var(--brand-dark);
        }

        /* ERROR */
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--red);
            margin-top: 12px;
            display: none;
            text-align: center;
        }

        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 16px 0;
        }

        .footer-note {
            text-align: center;
            margin-top: 18px;
            font-size: 12px;
            color: var(--muted);
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LICENSE EXPIRY WARNING -->
        <div class="license-alert" id="lic-alert"></div>

        <div class="logo">
            <div class="logo-icon">🍬</div>
            <h1>MI<span>THAAS</span></h1>
            <p>Mithai & Namkeen Shop Management</p>
        </div>

        </div> -->

            <div class="tab-btn active" onclick="switchTab('admin',this)">👑 Admin</div>
            <div class="tab-btn" onclick="switchTab('waiter',this)">🧑 Waiter</div>
            <div class="tab-btn" onclick="switchTab('kitchen',this)">👨‍🍳 Kitchen</div>

        </div> -->

<!-- 
        <div class="tab-switcher">
            <div class="tab-btn" onclick="switchTab('waiter',this)">🧑 Waiter</div>
            <div class="tab-btn" onclick="switchTab('kitchen',this)">👨‍🍳 Kitchen</div>
            <div class="tab-btn" onclick="switchTab('cashier',this)">💳 Cashier</div>
            <div class="tab-btn active" onclick="switchTab('admin',this)">👑 Admin</div>
        </div> -->

        
        <div class="tab-switcher">
            <div class="tab-btn active" onclick="switchTab('waiter',this)">🧑 Worker 1</div>
            <div class="tab-btn" onclick="switchTab('kitchen',this)">🏭 Worker 2</div>
            <div class="tab-btn" onclick="switchTab('cashier',this)">💳 Cashier</div>
            <div class="tab-btn" onclick="switchTab('admin',this)">👑 Admin</div>
        </div>




        <div class="card">

            <!-- ADMIN PANEL -->
            <!-- <div class="panel active" id="panel-admin"> -->
            <!-- ADMIN PANEL -->
            <div class="panel" id="panel-admin">
                <div class="form-group">
                    <label>Admin ID</label>
                    <input type="text" id="a-id" placeholder="Enter Admin ID " autocomplete="off">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="a-pwd" placeholder="••••••••">
                </div>
                <button class="btn" onclick="adminLogin()">Sign In as Admin</button>
                <div class="error" id="a-err"></div>
            </div>

            <!-- WAITER PANEL -->
            <!-- <div class="panel" id="panel-waiter"> -->
            <!-- WAITER PANEL -->
            <div class="panel active" id="panel-waiter">
                
                <div class="form-group">
                    <label>Worker 1 — Apna Naam</label>
                    <select id="w-name">
                        <option value="">— Loading... —</option>
                    </select>
                </div>
                <hr class="divider">
                <label>PIN</label>
                <div class="pin-display">
                    <div class="pin-dot" id="w0"></div>
                    <div class="pin-dot" id="w1"></div>
                    <div class="pin-dot" id="w2"></div>
                    <div class="pin-dot" id="w3"></div>
                </div>
                <div class="numpad">
                    <div class="num-btn" onclick="press('1','w')">1</div>
                    <div class="num-btn" onclick="press('2','w')">2</div>
                    <div class="num-btn" onclick="press('3','w')">3</div>
                    <div class="num-btn" onclick="press('4','w')">4</div>
                    <div class="num-btn" onclick="press('5','w')">5</div>
                    <div class="num-btn" onclick="press('6','w')">6</div>
                    <div class="num-btn" onclick="press('7','w')">7</div>
                    <div class="num-btn" onclick="press('8','w')">8</div>
                    <div class="num-btn" onclick="press('9','w')">9</div>
                    <div class="num-btn del" onclick="clearPin('w')">✕</div>
                    <div class="num-btn" onclick="press('0','w')">0</div>
                    <div class="num-btn del" onclick="backspace('w')">⌫</div>
                </div>
                <div class="error" id="w-err"></div>
            </div>

            <!-- KITCHEN PANEL -->
            <div class="panel" id="panel-kitchen">
                <div class="form-group">
                    <label>Worker 2 — Apna Naam</label>
                    <select id="k-name">
                        <option value="">— Loading... —</option>
                    </select>
                </div>
                <hr class="divider">
                <label>PIN</label>
                <div class="pin-display">
                    <div class="pin-dot" id="k0"></div>
                    <div class="pin-dot" id="k1"></div>
                    <div class="pin-dot" id="k2"></div>
                    <div class="pin-dot" id="k3"></div>
                </div>
                <div class="numpad">
                    <div class="num-btn" onclick="press('1','k')">1</div>
                    <div class="num-btn" onclick="press('2','k')">2</div>
                    <div class="num-btn" onclick="press('3','k')">3</div>
                    <div class="num-btn" onclick="press('4','k')">4</div>
                    <div class="num-btn" onclick="press('5','k')">5</div>
                    <div class="num-btn" onclick="press('6','k')">6</div>
                    <div class="num-btn" onclick="press('7','k')">7</div>
                    <div class="num-btn" onclick="press('8','k')">8</div>
                    <div class="num-btn" onclick="press('9','k')">9</div>
                    <div class="num-btn del" onclick="clearPin('k')">✕</div>
                    <div class="num-btn" onclick="press('0','k')">0</div>
                    <div class="num-btn del" onclick="backspace('k')">⌫</div>
                </div>
                <div class="error" id="k-err"></div>
            </div>

            <!-- CASHIER PANEL -->
            <div class="panel" id="panel-cashier">
                <div class="form-group">
                    <label>Your Name</label>
                    <select id="c-name">
                        <option value="">— Please select your name —</option>
                    </select>
                </div>
                <hr class="divider">
                <label>PIN</label>
                <div class="pin-display">
                    <div class="pin-dot" id="c0"></div>
                    <div class="pin-dot" id="c1"></div>
                    <div class="pin-dot" id="c2"></div>
                    <div class="pin-dot" id="c3"></div>
                </div>
                <div class="numpad">
                    <div class="num-btn" onclick="press('1','c')">1</div>
                    <div class="num-btn" onclick="press('2','c')">2</div>
                    <div class="num-btn" onclick="press('3','c')">3</div>
                    <div class="num-btn" onclick="press('4','c')">4</div>
                    <div class="num-btn" onclick="press('5','c')">5</div>
                    <div class="num-btn" onclick="press('6','c')">6</div>
                    <div class="num-btn" onclick="press('7','c')">7</div>
                    <div class="num-btn" onclick="press('8','c')">8</div>
                    <div class="num-btn" onclick="press('9','c')">9</div>
                    <div class="num-btn del" onclick="clearPin('c')">✕</div>
                    <div class="num-btn" onclick="press('0','c')">0</div>
                    <div class="num-btn del" onclick="backspace('c')">⌫</div>
                </div>
                <div class="error" id="c-err"></div>
            </div>

        </div>
        <!-- <div class="footer-note">Restora © 2026 · Powered by Nahar AI Technologies</div> -->
        <div class="footer-note" style="text-align:center;margin-top:18px;font-size:11px;color:var(--muted);line-height:1.8">
            Mithaas © 2026 · Crafted with ❤️ by <strong style="color:var(--brand)">Nahar AI Technologies</strong><br>
            <span style="font-size:10px">Goyam Nahar Jain &nbsp;·&nbsp; 📞 +91 94075 29992 &nbsp;·&nbsp; ✉️
                naharaitechnologies@gmail.com</span>
        </div>
    </div>

    <script>
        // let pins = { w: '', k: '' };
        let pins = { w: '', k: '', c: '' };

        // Check license on load
        window.addEventListener('load', async () => {
            try {
                const res = await fetch('/api/license_status');
                const lic = await res.json();
                if (lic.expiring_soon) {
                    const el = document.getElementById('lic-alert');
                    // el.textContent = `⚠️ License ${lic.days_left} din mein expire ho rahi hai (${lic.expiry}). Admin se contact karo.`;
                    el.textContent = `⚠️ License expires in ${lic.days_left} days (${lic.expiry}). Please contact your admin.`;
                    el.style.display = 'block';
                }
            } catch (e) { }
            // loadStaffNames('waiter');
            // loadStaffNames('kitchen');


            loadStaffNames('waiter');
            loadStaffNames('kitchen');
            loadStaffNames('cashier');
            
        });

        function switchTab(tab, el) {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('panel-' + tab).classList.add('active');
        }

        // Admin login
        async function adminLogin() {
            const err = document.getElementById('a-err');
            err.style.display = 'none';
            const res = await fetch('/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    role: 'admin',
                    admin_id: document.getElementById('a-id').value.trim(),
                    admin_password: document.getElementById('a-pwd').value
                })
            });
            const d = await res.json();
            if (d.ok) window.location.href = d.redirect;
            else { err.textContent = d.msg; err.style.display = 'block'; }
        }

        // Load staff names
        // async function loadStaffNames(role) {
        //     const selId = role === 'waiter' ? 'w-name' : 'k-name';


        async function loadStaffNames(role) {
            const selId = role === 'waiter' ? 'w-name' : role === 'kitchen' ? 'k-name' : 'c-name';


            const sel = document.getElementById(selId);
            try {
                const names = await fetch(`/api/staff_names?role=${role}`).then(r => r.json());
                sel.innerHTML = names.length
                    // ? '<option value="">— Naam select karo —</option>' + names.map(n => `<option value="${n}">${n}</option>`).join('')
                    // : '<option value="">Koi staff nahi mila</option>';

                    ? '<option value="">— Select your name —</option>' + names.map(n => `<option value="${n}">${n}</option>`).join('')
                    : '<option value="">No staff found</option>';

                    
            } catch (e) {
                sel.innerHTML = '<option value="">Error loading</option>';
            }
        }

        // PIN pad
        function press(n, prefix) {
            if (pins[prefix].length >= 4) return;
            pins[prefix] += n;
            updateDots(prefix);
            if (pins[prefix].length === 4) setTimeout(() => staffLogin(prefix), 150);
        }
        function backspace(p) { pins[p] = pins[p].slice(0, -1); updateDots(p); }
        // function clearPin(p) {
        //     pins[p] = ''; updateDots(p);
        //     document.getElementById(p === 'w' ? 'w-err' : 'k-err').style.display = 'none';
        // }


        function clearPin(p) {
            pins[p] = ''; updateDots(p);
            const errMap = { w: 'w-err', k: 'k-err', c: 'c-err' };
            document.getElementById(errMap[p] || 'w-err').style.display = 'none';
        }


        function updateDots(p) {
            for (let i = 0; i < 4; i++)
                document.getElementById(p + i).classList.toggle('filled', i < pins[p].length);
        }

        // Staff login
        // async function staffLogin(prefix) {
        //     const role = prefix === 'w' ? 'waiter' : 'kitchen';
        //     const nameId = prefix === 'w' ? 'w-name' : 'k-name';
        //     const errId = prefix === 'w' ? 'w-err' : 'k-err';


        async function staffLogin(prefix) {
            const role = prefix === 'w' ? 'waiter' : prefix === 'k' ? 'kitchen' : 'cashier';
            const nameId = prefix === 'w' ? 'w-name' : prefix === 'k' ? 'k-name' : 'c-name';
            const errId = prefix === 'w' ? 'w-err' : prefix === 'k' ? 'k-err' : 'c-err';

            
            const err = document.getElementById(errId);
            err.style.display = 'none';
            const name = document.getElementById(nameId).value;
            if (!name) {
                // err.textContent = 'Pehle apna naam select karo';
                err.textContent = 'Please select your name first';
                err.style.display = 'block';
                pins[prefix] = ''; updateDots(prefix); return;
            }
            const res = await fetch('/login', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ role, staff_name: name, staff_pin: pins[prefix] })
            });
            const d = await res.json();
            if (d.ok) window.location.href = d.redirect;
            else {
                err.textContent = d.msg; err.style.display = 'block';
                pins[prefix] = ''; updateDots(prefix);
            }
        }

        // Keyboard support
        document.addEventListener('keydown', e => {
            const activePanel = document.querySelector('.panel.active').id;
            if (activePanel === 'panel-admin') {
                if (e.key === 'Enter') adminLogin();
            } else {
                const p = activePanel === 'panel-waiter' ? 'w' : 'k';
                if (e.key >= '0' && e.key <= '9') press(e.key, p);
                else if (e.key === 'Backspace') backspace(p);
            }
        });
    </script>
</body>
