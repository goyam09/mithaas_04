<!--  kitchen_dashboard.html -->


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mithaas — Kitchen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --brand: #FF6B35;
            --brand-dark: #e55a25;
            --bg: #0a0a0a;
            --card: #141414;
            --card2: #1e1e1e;
            --card3: #262626;
            --border: #2a2a2a;
            --text: #f0f0f0;
            --muted: #666;
            --muted2: #999;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --blue: #3b82f6;
            --purple: #a855f7;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        /* TOP BAR */
        .topbar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-shrink: 0
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 16px
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--brand), #ff9a5c);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px
        }

        .logo h2 {
            font-size: 16px;
            font-weight: 800
        }

        .logo h2 span {
            color: var(--brand)
        }

        .kitchen-badge {
            background: rgba(255, 107, 53, .12);
            color: var(--brand);
            border: 1px solid rgba(255, 107, 53, .2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700
        }

        .topbar-center {
            display: flex;
            align-items: center;
            gap: 20px
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--card2);
            border: 1px solid var(--border);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px
        }

        .stat-pill .val {
            font-size: 16px;
            font-weight: 800
        }

        .stat-pill.pending .val {
            color: var(--yellow)
        }

        .stat-pill.ready .val {
            color: var(--green)
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(34, 197, 94, .08);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, .15);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600
        }

        .live-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 1.5s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        .time {
            font-size: 13px;
            color: var(--muted);
            font-variant-numeric: tabular-nums
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--muted);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            transition: all .15s
        }

        .logout-btn:hover {
            color: var(--red);
            border-color: var(--red)
        }

        /* TABS */
        .tabs-bar {
            display: flex;
            gap: 0;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 0 24px
        }

        .tab {
            padding: 12px 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted2);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all .15s
        }

        .tab:hover {
            color: var(--text)
        }

        .tab.active {
            color: var(--brand);
            border-bottom-color: var(--brand)
        }

        /* MAIN CONTENT */
        .content {
            padding: 20px 24px;
            flex: 1
        }

        .section {
            display: none
        }

        .section.active {
            display: block
        }

        /* ORDERS GRID */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 16px
        }

        /* ORDER CARD */
        .order-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: all .2s;
            position: relative
        }

        .order-card.new-order {
            border-color: var(--brand);
            animation: newOrder 0.5s ease
        }

        @keyframes newOrder {
            0% {
                transform: scale(0.95);
                opacity: 0
            }

            100% {
                transform: scale(1);
                opacity: 1
            }
        }

        .order-card.urgent {
            border-color: var(--red)
        }

        .order-card.almost-ready {
            border-color: var(--yellow)
        }

        .oc-header {
            padding: 12px 16px;
            background: var(--card2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border)
        }

        .oc-table {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -0.5px
        }

        .oc-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px
        }

        .oc-waiter {
            font-size: 11px;
            color: var(--muted);
            font-weight: 600
        }

        .oc-time-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 8px
        }

        .time-fresh {
            background: rgba(34, 197, 94, .12);
            color: var(--green)
        }

        .time-mid {
            background: rgba(245, 158, 11, .12);
            color: var(--yellow)
        }

        .time-old {
            background: rgba(239, 68, 68, .12);
            color: var(--red)
        }

        .oc-body {
            padding: 14px 16px
        }

        .oc-items {
            margin-bottom: 14px
        }

        .oc-item-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border)
        }

        .oc-item-row:last-child {
            border-bottom: none
        }

        .oc-qty {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            background: var(--brand);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 800;
            flex-shrink: 0
        }

        .oc-item-info {
            flex: 1;
            min-width: 0
        }

        .oc-item-name {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.3
        }

        .oc-item-spec {
            font-size: 11px;
            color: var(--yellow);
            margin-top: 2px;
            font-style: italic
        }

        .oc-item-status {
            flex-shrink: 0
        }

        .oc-footer {
            padding: 0 16px 14px;
            display: flex;
            gap: 8px
        }

        .btn {
            padding: 9px 16px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all .15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px
        }

        .btn-ready {
            background: var(--green);
            color: #fff;
            flex: 1
        }

        .btn-ready:hover {
            background: #16a34a;
            transform: translateY(-1px)
        }

        .btn-ready:active {
            transform: scale(0.98)
        }

        .btn-ghost {
            background: var(--card2);
            color: var(--muted2);
            border: 1px solid var(--border);
            flex-shrink: 0
        }

        .btn-ghost:hover {
            border-color: var(--brand);
            color: var(--brand)
        }

        /* Timer */
        .order-timer {
            font-size: 11px;
            font-variant-numeric: tabular-nums
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--muted)
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.4
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--muted2)
        }

        .empty-state p {
            font-size: 13px;
            line-height: 1.6
        }

        /* Completed orders */
        .completed-list {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .completed-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 16px
        }

        .ci-table {
            font-size: 18px;
            font-weight: 800;
            min-width: 60px
        }

        .ci-time {
            font-size: 12px;
            color: var(--muted);
            flex: 1
        }

        .ci-amount {
            font-size: 15px;
            font-weight: 700;
            color: var(--green)
        }

        .ci-badge {
            background: rgba(34, 197, 94, .1);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, .2);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 80px;
            right: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            max-width: 300px;
            z-index: 9999;
            transform: translateX(340px);
            transition: transform .3s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4)
        }

        .notification.show {
            transform: translateX(0)
        }

        .notif-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--brand)
        }

        .notif-body {
            font-size: 12px;
            color: var(--muted2)
        }

        /* Status dot */
        .sdot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0
        }

        .sdot-pending {
            background: var(--yellow)
        }

        .sdot-ready {
            background: var(--green)
        }

        /* @media(max-width:700px) {
            .topbar-center {
                display: none
            }

            .orders-grid {
                grid-template-columns: 1fr
            }
        } */


        @media(max-width:700px) {
            .topbar-center { display: none }
            .orders-grid { grid-template-columns: 1fr }
            .topbar { padding: 0 14px }
            .content { padding: 14px }
        }
        @media(max-width:480px) {
            .logo h2 { display: none }
            .kitchen-badge { font-size: 11px; padding: 3px 8px }
        }

        
    </style>
</head>

<body>

    <!-- TOP BAR -->
    <div class="topbar">
        <div class="topbar-left">
            <div class="logo">
                <div class="logo-icon">👨‍🍳</div>
                <h2>MI<span>THAAS</span></h2>
            </div>
            <span class="kitchen-badge">🔥 Kitchen Display</span>
        </div>
        <div class="topbar-center">
            <div class="stat-pill pending">
                <span class="sdot sdot-pending"></span>
                <span>Pending</span>
                <span class="val" id="stat-pending">0</span>
            </div>
            <div class="stat-pill ready">
                <span class="sdot sdot-ready"></span>
                <span>Ready</span>
                <span class="val" id="stat-ready">0</span>
            </div>
        </div>
        <div class="topbar-right">
            <div class="live-badge">
                <div class="live-dot"></div>LIVE
            </div>
            <span class="time" id="live-time"></span>
            <a class="logout-btn" href="/logout">🚪 Exit</a>
        </div>
    </div>

    <!-- TABS -->
    <div class="tabs-bar">
        <div class="tab active" onclick="switchTab('active',this)">🔥 Active Orders <span id="active-tab-count"
                style="background:var(--brand);color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;margin-left:6px">0</span>
        </div>
        <div class="tab" onclick="switchTab('completed',this)">✅ Completed Today</div>
    </div>

    <!-- CONTENT -->
    <div class="content">
        <div class="section active" id="sec-active">
            <div class="orders-grid" id="orders-grid">
                <div class="empty-state" style="grid-column:1/-1">
                    <div class="icon">🍽️</div>
                    <h3>All Clear!</h3>
                    <p>No active orders right now.<br>New orders will appear here instantly.</p>
                </div>
            </div>
        </div>

        <div class="section" id="sec-completed">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
                <span style="font-size:13px;color:var(--muted)" id="completed-label">Today's completed orders</span>
                <button onclick="loadCompleted()"
                    style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted2);cursor:pointer;font-size:12px">↻
                    Refresh</button>
            </div>
            <div class="completed-list" id="completed-list">
                <div style="text-align:center;color:var(--muted);padding:40px;font-size:13px">No completed orders yet
                    today</div>
            </div>
        </div>
    </div>

    <!-- Notification popup -->
    <div class="notification" id="notif">
        <div class="notif-title" id="notif-title">New Order!</div>
        <div class="notif-body" id="notif-body"></div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        let orders = [];
        let lastOrderIds = new Set();
        let isFirstLoad = true;

        // Time
        setInterval(() => { $('live-time').textContent = new Date().toLocaleTimeString('en-IN', { hour12: true, hour: 'numeric', minute: '2-digit', second: '2-digit' }); }, 1000);

        // Tab switch
        function switchTab(tab, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            $('sec-' + tab).classList.add('active');
            if (tab === 'completed') loadCompleted();
        }

        // Time elapsed
        function elapsed(dateStr) {
            const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
            if (diff < 60) return `${diff}s ago`;
            if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
            return `${Math.floor(diff / 3600)}h ago`;
        }
        function elapsedMin(dateStr) {
            return Math.floor((Date.now() - new Date(dateStr).getTime()) / 60000);
        }
        function timeClass(dateStr) {
            const m = elapsedMin(dateStr);
            if (m < 8) return 'time-fresh';
            if (m < 15) return 'time-mid';
            return 'time-old';
        }

        // Notification
        function showNotif(title, body) {
            $('notif-title').textContent = title;
            $('notif-body').textContent = body;
            const n = $('notif');
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 4000);
            // Try audio beep
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 880; gain.gain.value = 0.3;
                osc.start(); osc.stop(ctx.currentTime + 0.15);
                setTimeout(() => { const o2 = ctx.createOscillator(); const g2 = ctx.createGain(); o2.connect(g2); g2.connect(ctx.destination); o2.frequency.value = 1100; g2.gain.value = 0.3; o2.start(); o2.stop(ctx.currentTime + 0.15); }, 200);
            } catch (e) { }
        }

        // Load orders
        async function loadOrders() {
            const data = await fetch('/api/kitchen/orders').then(r => r.json());
            const currentIds = new Set(data.map(o => o.id));

            // Detect new orders (not on first load)
            if (!isFirstLoad) {
                data.forEach(o => {
                    if (!lastOrderIds.has(o.id)) {
                        showNotif(`🔥 New Order — ${o.table_number ? 'Table ' + o.table_number : 'Walk-in'}`, `${o.items.length} item(s) · From: ${o.waiter_name || 'Waiter'}`);
                    }
                });
            }

            lastOrderIds = currentIds;
            isFirstLoad = false;
            orders = data;
            renderOrders(data);
            updateStats(data);
        }

        function updateStats(data) {
            const pending = data.filter(o => o.items.some(i => i.status === 'pending')).length;
            const ready = data.filter(o => o.items.every(i => i.status === 'ready')).length;
            $('stat-pending').textContent = pending;
            $('stat-ready').textContent = ready;
            $('active-tab-count').textContent = data.length;
        }

        function renderOrders(data) {
            if (!data.length) {
                $('orders-grid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="icon">🍽️</div>
        <h3>All Clear!</h3>
        <p>No active orders right now.<br>New orders will appear here instantly.</p>
      </div>`;
                return;
            }

            $('orders-grid').innerHTML = data.map(order => {
                const allReady = order.items.every(i => i.status === 'ready');
                const someReady = order.items.some(i => i.status === 'ready');
                const min = elapsedMin(order.created_at);
                const cardClass = min >= 15 ? 'urgent' : min >= 8 ? 'almost-ready' : '';

                return `<div class="order-card ${cardClass}" id="order-card-${order.id}">
      <div class="oc-header">
        <div>
          <div class="oc-table">${order.table_number ? 'Table ' + order.table_number : '🚶 Walk-in'}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Order #${order.id}</div>
        </div>
        <div class="oc-meta">
          <div class="oc-waiter">🧑‍🍳 ${order.waiter_name || 'Waiter'}</div>
          <div class="oc-time-badge ${timeClass(order.created_at)} order-timer" data-time="${order.created_at}">${elapsed(order.created_at)}</div>
        </div>
      </div>
      <div class="oc-body">
        <div class="oc-items">
          ${order.items.map(item => `
            <div class="oc-item-row">
              <div class="oc-qty">${item.quantity}</div>
              <div class="oc-item-info">
                <div class="oc-item-name">${item.item_name}</div>
                ${item.special_instruction ? `<div class="oc-item-spec">⚠ ${item.special_instruction}</div>` : ''}
              </div>
              <div class="oc-item-status">
                <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;background:${item.status === 'ready' ? 'rgba(34,197,94,.12)' : 'rgba(245,158,11,.12)'};color:${item.status === 'ready' ? 'var(--green)' : 'var(--yellow)'}">${item.status.toUpperCase()}</span>
              </div>
            </div>`).join('')}
        </div>
      </div>
      <div class="oc-footer">
        ${!allReady ? `<button class="btn btn-ready" onclick="markReady(${order.id})">✓ Mark All Ready</button>` :
                        `<button class="btn btn-ready" style="background:var(--muted);cursor:default">✅ Ready — Waiting for Waiter</button>`}
      </div>
    </div>`;
            }).join('');
        }

        // Mark ready
        async function markReady(oid) {
            const card = $('order-card-' + oid);
            if (card) { card.style.opacity = '0.6'; card.style.transform = 'scale(0.98)'; }
            await fetch('/api/kitchen/mark_ready', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ order_id: oid }) });
            await loadOrders();
            showNotif('✅ Order Ready', `Table order marked ready — waiter notified!`);
        }

        // Completed
        async function loadCompleted() {
            const data = await fetch('/api/kitchen/completed_orders').then(r => r.json());
            $('completed-label').textContent = `${data.length} orders completed today`;
            if (!data.length) {
                $('completed-list').innerHTML = '<div style="text-align:center;color:var(--muted);padding:40px;font-size:13px">No completed orders yet today</div>';
                return;
            }
            $('completed-list').innerHTML = data.map(o => `
    <div class="completed-item">
      <div class="ci-table">Table ${o.table_number}</div>
      <div class="ci-time">${new Date(o.completed_at).toLocaleTimeString('en-IN', { hour12: true, hour: 'numeric', minute: '2-digit' })}</div>
      <div class="ci-amount">₹${parseFloat(o.total_amount).toFixed(0)}</div>
      <span class="ci-badge">✓ Done</span>
    </div>`).join('');
        }

        // Update timers every second without re-rendering  
        setInterval(() => {
            document.querySelectorAll('.order-timer').forEach(el => {
                const t = el.dataset.time;
                el.textContent = elapsed(t);
                el.className = 'oc-time-badge ' + timeClass(t) + ' order-timer';
            });
        }, 5000);

        // Auto-refresh orders every 5 seconds
        // Auto-refresh orders every 1 second (background)
        setInterval(loadOrders, 1000);
        // Initial load
        loadOrders();
    </script>
</body>

</html>
